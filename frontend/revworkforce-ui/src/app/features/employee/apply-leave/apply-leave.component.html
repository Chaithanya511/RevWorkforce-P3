<div class="d-flex">
  <div class="sidebar-overlay" [class.sidebar-open]="isSidebarOpen" (click)="toggleSidebar()"></div>
  <app-sidebar [isOpen]='isSidebarOpen' />

  <div class="main-content">
    <div class="topbar">
      <div>
        <div class="page-title">Apply Leave</div>
        <div class="page-breadcrumb">Home / Leave / Apply</div>
      </div>
      <div class="topbar-right">
        <button class="menu-toggle" (click)="toggleSidebar()">&#9776;</button><div class="topbar-avatar">{{ getInitials(auth.currentUser()?.name) }}</div>
      </div>
    </div>

    <div class="content-area">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card-panel">
            <div class="card-panel-header">
              <div class="card-panel-title">Apply for Leave</div>
            </div>

            @if (successMsg()) {
              <div style="background:rgba(16,185,129,0.1);color:#059669;padding:0.75rem 1rem;border-radius:8px;margin-bottom:1rem;font-size:0.85rem;">
                {{ successMsg() }}
              </div>
            }

            @if (errorMsg()) {
              <div style="background:rgba(239,68,68,0.1);color:#dc2626;padding:0.75rem 1rem;border-radius:8px;margin-bottom:1rem;font-size:0.85rem;">
                {{ errorMsg() }}
              </div>
            }

            <form (ngSubmit)="onSubmit()" style="padding:1rem;">
              <div class="mb-3">
                <label style="display:block;font-weight:600;margin-bottom:0.5rem;font-size:0.85rem;">Leave Type</label>
                <select [(ngModel)]="leaveData.leaveTypeId" name="leaveTypeId" required
                  style="width:100%;border:1px solid var(--border);border-radius:8px;padding:0.65rem;font-size:0.85rem;font-family:'DM Sans',sans-serif;outline:none;">
                  <option [value]="null">Select leave type</option>
                  @for (type of leaveTypes(); track type.id) {
                    <option [value]="type.id">{{ type.name }}</option>
                  }
                </select>
              </div>

              <div class="row mb-3">
                <div class="col-md-6">
                  <label style="display:block;font-weight:600;margin-bottom:0.5rem;font-size:0.85rem;">Start Date</label>
                  <input type="date" [(ngModel)]="leaveData.fromDate" name="fromDate" required
                    style="width:100%;border:1px solid var(--border);border-radius:8px;padding:0.65rem;font-size:0.85rem;font-family:'DM Sans',sans-serif;outline:none;" />
                </div>
                <div class="col-md-6">
                  <label style="display:block;font-weight:600;margin-bottom:0.5rem;font-size:0.85rem;">End Date</label>
                  <input type="date" [(ngModel)]="leaveData.toDate" name="toDate" required
                    style="width:100%;border:1px solid var(--border);border-radius:8px;padding:0.65rem;font-size:0.85rem;font-family:'DM Sans',sans-serif;outline:none;" />
                </div>
              </div>

              <div class="mb-3">
                <label style="display:block;font-weight:600;margin-bottom:0.5rem;font-size:0.85rem;">Reason</label>
                <textarea [(ngModel)]="leaveData.reason" name="reason" required rows="4"
                  style="width:100%;border:1px solid var(--border);border-radius:8px;padding:0.65rem;font-size:0.85rem;font-family:'DM Sans',sans-serif;outline:none;resize:vertical;"
                  placeholder="Enter reason for leave..."></textarea>
              </div>

              <div class="d-flex gap-2">
                <button type="submit" [disabled]="isLoading()"
                  style="background:var(--accent);color:#fff;border:none;padding:0.65rem 1.5rem;border-radius:8px;font-weight:600;font-size:0.85rem;cursor:pointer;">
                  @if (isLoading()) {
                    <span class="spinner-border spinner-border-sm me-2"></span>
                  }
                  Submit
                </button>
                <button type="button" (click)="router.navigate(['/' + getRole().toLowerCase()])"
                  style="background:var(--bg-secondary);color:var(--text-main);border:1px solid var(--border);padding:0.65rem 1.5rem;border-radius:8px;font-weight:600;font-size:0.85rem;cursor:pointer;">
                  Cancel
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
